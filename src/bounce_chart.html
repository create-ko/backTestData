<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
 body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:#f7f7f8;margin:0;padding:24px;color:#222}
 .card{background:#fff;border:1px solid #eee;border-radius:16px;padding:22px;box-shadow:0 1px 6px rgba(0,0,0,.05);max-width:980px;margin:auto}
 h1{font-size:20px;margin:0 0 4px}.sub{color:#888;font-size:13px;margin-bottom:18px}
 .ctrl{display:flex;gap:22px;margin-bottom:14px;flex-wrap:wrap}
 .ctrl label{font-size:12px;color:#999;display:block;margin-bottom:4px}
 select{padding:7px 12px;border:1px solid #ddd;border-radius:9px;font-size:14px;background:#fff}
 table{border-collapse:collapse;width:100%;margin-top:20px;font-size:13px}
 th,td{padding:7px 9px;text-align:center;border-bottom:1px solid #f0f0f0}

 .k{color:#e0a400}.b{color:#3b82f6}

</style></head><body><div class="card">
<h1>📊 반등 단계별 도달 수익 (ktr) — KTR vs BREAKOUT</h1>
<div class="sub">바로출발·N번눌림 후 출발 시 바닥에서 도달한 수익폭 (2020~2026, 반등=손절 제외)</div>
<div class="ctrl">
 <div><label>지표</label><select id="metric"><option value="avg">평균</option><option value="med">중앙값</option><option value="max">최대</option></select></div>
 <div><label>측정</label><select id="meas"></select></div>
 <div><label>타임프레임</label><select id="tf"></select></div>
</div>
<canvas id="ch" height="135"></canvas>
<table id="tbl"></table>
<div class="note">· <b class="k">KTR</b> = 세션 KTR 기준 그리드 · <b class="b">BREAKOUT</b> = 돌파캔들크기 기준 그리드<br>
· x축 = 반등이 일어난 단계(괄호=그리드 바닥 위치, ktr) · y축 = 바닥 기준 도달 수익(ktr)<br>
· 깊은 단계는 표본이 적음(막대 위 n 확인) → 평균 해석 주의</div>
</div>
<script>
const DATA={"트레일(결국 얼마나)": {"전체": {"labels": ["바로출발 (0ktr)", "1번눌림 (-1ktr)", "2번눌림 (-2ktr)", "3번눌림 (-3ktr)", "4번눌림 (-4ktr)", "6차 (-4.5ktr)"], "KTR": {"n": [43989, 4591, 658, 171, 36, 26], "avg": [1.77, 1.49, 2.6, 3.61, 4.76, 5.45], "med": [1.51, 1.25, 2.28, 3.28, 4.41, 4.87], "max": [25.95, 14.23, 12.24, 7.64, 7.39, 9.82]}, "BREAKOUT": {"n": [46798, 2575, 127, 22, 2, 6], "avg": [1.72, 1.37, 2.16, 3.12, 4.05, 4.41], "med": [1.48, 1.16, 2.07, 3.07, 4.17, 4.49], "max": [27.73, 10.54, 4.48, 4.9, 4.17, 4.62]}}, "2m": {"labels": ["바로출발 (0ktr)", "1번눌림 (-1ktr)", "2번눌림 (-2ktr)", "3번눌림 (-3ktr)", "4번눌림 (-4ktr)", "6차 (-4.5ktr)"], "KTR": {"n": [27368, 2519, 330, 92, 18, 6], "avg": [1.78, 1.47, 2.57, 3.58, 4.69, 6.13], "med": [1.52, 1.25, 2.26, 3.24, 4.43, 7.19], "max": [25.95, 14.23, 11.9, 7.64, 7.39, 7.55]}, "BREAKOUT": {"n": [28586, 1688, 80, 12, 2, 3], "avg": [1.73, 1.37, 2.11, 2.99, 4.05, 4.35], "med": [1.49, 1.17, 2.07, 3.03, 4.17, 4.49], "max": [27.73, 6.46, 3.74, 3.4, 4.17, 4.62]}}, "5m": {"labels": ["바로출발 (0ktr)", "1번눌림 (-1ktr)", "2번눌림 (-2ktr)", "3번눌림 (-3ktr)", "4번눌림 (-4ktr)", "6차 (-4.5ktr)"], "KTR": {"n": [11004, 1295, 184, 43, 11, 12], "avg": [1.77, 1.51, 2.62, 3.54, 4.99, 5.46], "med": [1.5, 1.25, 2.28, 3.25, 4.29, 4.85], "max": [17.6, 10.08, 7.05, 5.36, 6.97, 9.82]}, "BREAKOUT": {"n": [11925, 605, 23, 8, 0, 2], "avg": [1.71, 1.34, 2.15, 3.27, null, 4.48], "med": [1.47, 1.15, 2.01, 3.07, null, 4.51], "max": [21.83, 10.54, 4.48, 4.9, null, 4.51]}}, "10m": {"labels": ["바로출발 (0ktr)", "1번눌림 (-1ktr)", "2번눌림 (-2ktr)", "3번눌림 (-3ktr)", "4번눌림 (-4ktr)", "6차 (-4.5ktr)"], "KTR": {"n": [5617, 777, 144, 36, 7, 8], "avg": [1.75, 1.51, 2.64, 3.79, 4.58, 4.91], "med": [1.49, 1.26, 2.33, 3.58, 4.29, 4.66], "max": [13.66, 10.08, 12.24, 7.4, 6.05, 5.73]}, "BREAKOUT": {"n": [6287, 282, 24, 2, 0, 1], "avg": [1.7, 1.38, 2.31, 3.31, null, 4.46], "med": [1.48, 1.14, 2.12, 4.54, null, 4.46], "max": [10.67, 8.53, 4.42, 4.54, null, 4.46]}}}, "본전복귀(보수)": {"전체": {"labels": ["바로출발 (0ktr)", "1번눌림 (-1ktr)", "2번눌림 (-2ktr)", "3번눌림 (-3ktr)", "4번눌림 (-4ktr)", "6차 (-4.5ktr)"], "KTR": {"n": [43989, 4591, 658, 171, 36, 26], "avg": [0.46, 1.3, 2.6, 3.61, 4.76, 5.45], "med": [0.25, 1.15, 2.28, 3.28, 4.41, 4.87], "max": [25.95, 14.23, 12.24, 7.64, 7.39, 9.82]}, "BREAKOUT": {"n": [46798, 2575, 127, 22, 2, 6], "avg": [0.38, 0.98, 2.15, 3.12, 4.05, 4.41], "med": [0.27, 1.03, 2.07, 3.07, 4.17, 4.49], "max": [8.8, 3.36, 4.48, 4.9, 4.17, 4.62]}}, "2m": {"labels": ["바로출발 (0ktr)", "1번눌림 (-1ktr)", "2번눌림 (-2ktr)", "3번눌림 (-3ktr)", "4번눌림 (-4ktr)", "6차 (-4.5ktr)"], "KTR": {"n": [27368, 2519, 330, 92, 18, 6], "avg": [0.4, 1.22, 2.57, 3.58, 4.69, 6.13], "med": [0.22, 1.11, 2.26, 3.24, 4.43, 7.19], "max": [25.95, 14.23, 11.9, 7.64, 7.39, 7.55]}, "BREAKOUT": {"n": [28586, 1688, 80, 12, 2, 3], "avg": [0.37, 0.96, 2.11, 2.99, 4.05, 4.35], "med": [0.26, 1.02, 2.07, 3.03, 4.17, 4.49], "max": [7.66, 3.36, 3.74, 3.4, 4.17, 4.62]}}, "5m": {"labels": ["바로출발 (0ktr)", "1번눌림 (-1ktr)", "2번눌림 (-2ktr)", "3번눌림 (-3ktr)", "4번눌림 (-4ktr)", "6차 (-4.5ktr)"], "KTR": {"n": [11004, 1295, 184, 43, 11, 12], "avg": [0.51, 1.37, 2.62, 3.54, 4.99, 5.46], "med": [0.29, 1.17, 2.28, 3.25, 4.29, 4.85], "max": [17.6, 9.68, 7.05, 5.36, 6.97, 9.82]}, "BREAKOUT": {"n": [11925, 605, 23, 8, 0, 2], "avg": [0.39, 1.02, 2.15, 3.27, null, 4.48], "med": [0.28, 1.04, 2.01, 3.07, null, 4.51], "max": [8.8, 2.73, 4.48, 4.9, null, 4.51]}}, "10m": {"labels": ["바로출발 (0ktr)", "1번눌림 (-1ktr)", "2번눌림 (-2ktr)", "3번눌림 (-3ktr)", "4번눌림 (-4ktr)", "6차 (-4.5ktr)"], "KTR": {"n": [5617, 777, 144, 36, 7, 8], "avg": [0.63, 1.44, 2.64, 3.79, 4.58, 4.91], "med": [0.37, 1.22, 2.33, 3.58, 4.29, 4.66], "max": [13.66, 9.48, 12.24, 7.4, 6.05, 5.73]}, "BREAKOUT": {"n": [6287, 282, 24, 2, 0, 1], "avg": [0.4, 1.06, 2.31, 3.31, null, 4.46], "med": [0.28, 1.07, 2.12, 4.54, null, 4.46], "max": [5.91, 2.6, 4.42, 4.54, null, 4.46]}}}};
const metric=document.getElementById('metric'),meas=document.getElementById('meas'),tf=document.getElementById('tf');
Object.keys(DATA).forEach(m=>meas.add(new Option(m,m)));
['전체','2m','5m','10m'].forEach(t=>tf.add(new Option(t,t)));
Chart.register(ChartDataLabels);
let chart;
function draw(){
 const d=DATA[meas.value][tf.value],mt=metric.value;
 if(chart)chart.destroy();
 chart=new Chart(document.getElementById('ch'),{type:'bar',
  data:{labels:d.labels,datasets:[
   {label:'KTR',data:d.KTR[mt],backgroundColor:'#ffce4d',borderRadius:5},
   {label:'BREAKOUT',data:d.BREAKOUT[mt],backgroundColor:'#7fb2ff',borderRadius:5}]},
  options:{responsive:true,plugins:{legend:{position:'top'},
    datalabels:{anchor:'end',align:'end',font:{size:11,weight:'600'},formatter:v=>v==null?'':v},
    tooltip:{callbacks:{afterBody:it=>{const i=it[0].dataIndex;return 'n(KTR)='+d.KTR.n[i]+'  n(BRK)='+d.BREAKOUT.n[i];}}}},
   scales:{y:{title:{display:true,text:'도달 수익 (ktr)'},beginAtZero:true,grace:'12%'}}}});
 let h='<tr><th>단계 (바닥)</th><th class="k">KTR 평균</th><th class="k">중앙</th><th class="k">최대</th><th class="k">n</th>'
      +'<th class="b">BRK 평균</th><th class="b">중앙</th><th class="b">최대</th><th class="b">n</th></tr>';
 d.labels.forEach((l,i)=>{h+=`<tr><td class="lab">${l}</td>`
   +`<td>${d.KTR.avg[i]??'-'}</td><td>${d.KTR.med[i]??'-'}</td><td>${d.KTR.max[i]??'-'}</td><td>${d.KTR.n[i]}</td>`
   +`<td>${d.BREAKOUT.avg[i]??'-'}</td><td>${d.BREAKOUT.med[i]??'-'}</td><td>${d.BREAKOUT.max[i]??'-'}</td><td>${d.BREAKOUT.n[i]}</td></tr>`;});
 document.getElementById('tbl').innerHTML=h;
}
[metric,meas,tf].forEach(s=>s.onchange=draw);draw();
</script></body></html>
